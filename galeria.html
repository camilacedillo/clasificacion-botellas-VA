<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clasificación Botellas VA</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">Reciclaje Inteligente</div>
            <nav>
                <a href="index.html">Inicio</a>
                <a href="problema.html">Problema</a>
                <a href="solucion.html">Solución</a>
                <a href="vision-artificial.html">VA</a>
                <a href="equipo.html">Equipo</a>
                <a href="galeria.html" class="active">Galería</a>
                <a href="resultados.html">Resultados</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="content">
                <h1>Galería del Proyecto</h1>
                
                <p>Documentación visual del prototipo y sistema de clasificación automática de botellas</p>

                <div class="gallery">
                    <div class="gallery-item">
                        <video id="video1" muted loop preload="metadata" title="Detección del material de la botella ingresada.">
                            <source src="Vid_1.MOV" type="mp4">
                            Tu navegador no soporta video.
                        </video>
                        <div class="gallery-label">
                        </div>
                        <figcaption style="color: #000000; font-weight: bold;">Detección de botella de vidrio</figcaption>
                    </div>

                    <div class="gallery-item">
                        <video id="video2" muted loop preload="metadata" title="Detección del material de la botella ingresada.">
                            <source src="Vid_2.MOV" type="mp4">
                            <track></track>
                            Tu navegador no soporta video.
                        </video>
                        <div class="gallery-label">
                        </div>
                        <figcaption style="color: #000000; font-weight: bold;">Detección de botella de metal</figcaption>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 Clasificación Automatizada de Botellas - Unidad Educativa Técnico Salesiano</p>
        </div>
    </footer>

    <button class="scroll-top" onclick="scrollToTop()">↑</button>

    <script>
        // Scroll to top functionality
        window.addEventListener('scroll', () => {
            document.querySelector('.scroll-top').style.display = window.pageYOffset > 300 ? 'block' : 'none';
        });

        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Auto-play videos functionality
        window.addEventListener('load', function() {
            const videos = document.querySelectorAll('video');
            
            videos.forEach(video => {
                // Muted y loop ya están en el HTML
                video.play().catch(error => {
                    console.log('Autoplay prevented:', error);
                    // Opcional: mostrar controles si autoplay falla
                    video.controls = true;
                });
            });
        });
    </script>
</body>
</html>
